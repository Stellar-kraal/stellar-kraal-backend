##
# .github/workflows/monitoring-ci.yml
#
# CI for the on-chain anomaly detection / monitoring service
# (src/monitoring/, monitoring/). Builds it with its own standalone
# tsconfig, runs its unit test suite, and validates the Docker image.
#
# No secrets are required: the service's env vars are only needed at
# runtime, and tests/setup/jest.setup.ts provides safe test-only values.
##

name: Monitoring CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/monitoring/**'
      - 'tests/unit/monitoring/**'
      - 'monitoring/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/monitoring-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/monitoring/**'
      - 'tests/unit/monitoring/**'
      - 'monitoring/**'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/monitoring-ci.yml'

concurrency:
  group: monitoring-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build monitoring service
        run: npx tsc --project monitoring/tsconfig.json

      - name: Run monitoring unit tests
        run: npx jest --runInBand --forceExit tests/unit/monitoring

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build monitoring image
        run: docker build -f monitoring/Dockerfile -t stellarkraal-monitoring:ci .
