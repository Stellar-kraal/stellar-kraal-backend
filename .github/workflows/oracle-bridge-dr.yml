name: Oracle Bridge DR

on:
  push:
    branches: [main]
    paths:
      - "oracle-bridge/**"
      - "docker-compose.yml"
      - ".github/workflows/oracle-bridge-dr.yml"
  pull_request:
    branches: [main]
    paths:
      - "oracle-bridge/**"
      - "docker-compose.yml"
      - ".github/workflows/oracle-bridge-dr.yml"
  workflow_dispatch: {}

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oracle-bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: oracle-bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  backup-restore-functional-test:
    name: Backup restoration produces a functional bridge (mock secrets)
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: oracle-bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: oracle-bridge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Backup + restore functional check
        run: ./scripts/backup-restore-check.sh

  dr-drill:
    name: DR drill (docker compose, promote standby, assert < 15 min)
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      ORACLE_BRIDGE_CONTRACT_ID: CCICONTRACT00000000000000000000000000000000000000000
      ORACLE_BRIDGE_SIGNING_KEY_SECRET_REF: mock://oracle-bridge/signing-key
      ORACLE_BRIDGE_SECRETS_PROVIDER: mock
      ORACLE_BRIDGE_DRY_RUN: "true"
      ORACLE_BRIDGE_BACKUP_INTERVAL_MS: "5000"
      ORACLE_BRIDGE_SUBMIT_INTERVAL_MS: "8000"
    steps:
      - uses: actions/checkout@v4

      - name: Build bridge images
        run: docker compose build

      - name: Run DR drill
        run: ./oracle-bridge/scripts/drill.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
