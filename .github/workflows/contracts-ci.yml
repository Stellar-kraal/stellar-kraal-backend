name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/contracts-ci.yml"
      - "docs/compliance/sep41-audit.md"

env:
  CARGO_TERM_COLOR: always

jobs:
  carbon-credit:
    name: carbon_credit (SEP-41)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy -p carbon_credit -p carbon_registry --all-targets -- -D warnings

      - name: unit + SEP-41 conformance tests
        run: cargo test -p carbon_credit

      - name: wasm build
        run: cargo build --release --target wasm32-unknown-unknown -p carbon_credit
