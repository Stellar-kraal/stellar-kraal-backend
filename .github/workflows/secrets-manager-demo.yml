name: Secrets Manager Deploy Demo

# Demonstrates the deploy-time secrets pattern described in
# docs/ops/secrets-rotation.md: resolve secret references through a
# SecretsProvider at deploy time and inject the resolved values into the
# process environment for that step only. Uses MockSecretsProvider so this
# workflow needs no real cloud credentials — swapping SECRETS_PROVIDER=mock
# for SECRETS_PROVIDER=aws (once that provider is implemented) is the only
# change needed to point this at a real secrets manager.

on:
  push:
    branches: [main]
    paths:
      - "src/lib/secretsProvider.ts"
      - "scripts/rotate-jwt-secret.ts"
      - "docs/ops/secrets-rotation.md"
      - ".github/workflows/secrets-manager-demo.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/lib/secretsProvider.ts"
      - "scripts/rotate-jwt-secret.ts"
      - "docs/ops/secrets-rotation.md"
      - ".github/workflows/secrets-manager-demo.yml"
  workflow_dispatch: {}

jobs:
  deploy-with-mock-secrets:
    name: Resolve secrets at deploy time (mock provider)
    runs-on: ubuntu-latest
    env:
      SECRETS_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve secret references (deploy-time step)
        id: resolve-secrets
        run: |
          node --require ts-node/register -e "
            const { createSecretsProvider } = require('./src/lib/secretsProvider');
            (async () => {
              const provider = createSecretsProvider(process.env.SECRETS_PROVIDER);
              const jwtSecret = await provider.resolveSecret('mock://backend/jwt-secret');
              const dbPassword = await provider.resolveSecret('mock://backend/db-password');
              // Masked so resolved values never appear in logs, matching how a real
              // secrets manager's output should be handled in CI.
              console.log('::add-mask::' + jwtSecret);
              console.log('::add-mask::' + dbPassword);
              const fs = require('fs');
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'resolved=true\n');
            })().catch((err) => { console.error(err); process.exit(1); });
          "

      - name: "Deploy (demo — no real target)"
        if: steps.resolve-secrets.outputs.resolved == 'true'
        run: |
          echo "Secrets resolved from secrets manager at deploy time, never baked into an image."
          echo "A real deploy step would inject these into the target environment here."
